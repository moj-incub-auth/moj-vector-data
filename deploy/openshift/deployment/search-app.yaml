---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: search-app
  template:
    metadata:
      labels:
        app: search-app
    spec:
      containers:
      - name: api
        image: 'image-registry.openshift-image-registry.svc:5000/moj-vector-data/search-app:latest'
        ports:
        - containerPort: 8080
        env:
        - name: MILVUS_HOST
          value: "my-release-milvus.milvus.svc.cluster.local"
        - name: MILVUS_PORT
          value: "19530"
        - name: MILVUS_COLLECTION
          value: "knowledge_base"
        - name: EMBEDDING_API_URL
          value: "http://qwen3-embedding-predictor.vllm-serving.svc.cluster.local"
        - name: EMBEDDING_API_MODEL
          value: "qwen3-embedding"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: moj-search-api
  namespace: milvus
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: moj-search-api
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: moj-search-api
  namespace: milvus
spec:
  to:
    kind: Service
    name: moj-search-api
    weight: 100
  port:
    targetPort: 8080
  wildcardPolicy: None
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect