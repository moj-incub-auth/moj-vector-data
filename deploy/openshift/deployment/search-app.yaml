---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moj-search-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moj-search-app
  template:
    metadata:
      annotations:
        "instrumentation.opentelemetry.io/inject-python": "true"
      labels:
        app: moj-search-app
    spec:
      containers:
      - name: moj-search-app
        image: 'image-registry.openshift-image-registry.svc:5000/moj-vector-data/search-app:latest'
        ports:
        - containerPort: 8080
        env:
        - name: MILVUS_HOST
          value: "moj-milvus.moj-vector-data.svc.cluster.local"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: moj-search-app
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: moj-search-app
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: moj-search-app
spec:
  to:
    kind: Service
    name: moj-search-app
    weight: 100
  port:
    targetPort: 8080
  wildcardPolicy: None
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect